<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="vio" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#7c3aed"/></marker>
    <marker id="sky" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#0ea5e9"/></marker>
    <marker id="gry" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/></marker>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/><stop offset="0.5" stop-color="#8b5cf6"/><stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="720" fill="#0b1120"/>

  <text x="60" y="64" font-size="34" font-weight="700" fill="url(#title)">Cosine similarity — closeness is the angle, not the distance</text>
  <text x="60" y="98" font-size="19" fill="#94a3b8">Each chunk of audio becomes a vector. A search query becomes a vector too. Similar meanings point the same way.</text>

  <!-- axes -->
  <line x1="160" y1="640" x2="980" y2="640" stroke="#1e293b" stroke-width="2"/>
  <line x1="160" y1="640" x2="160" y2="170" stroke="#1e293b" stroke-width="2"/>
  <circle cx="160" cy="640" r="5" fill="#475569"/>
  <text x="138" y="668" font-size="14" fill="#64748b">origin</text>

  <!-- small-angle wedge between query and its neighbours -->
  <path d="M160,640 L508,330 A 380 380 0 0 0 372 251 Z" fill="#7c3aed" opacity="0.10"/>

  <!-- vectors (arrows from origin) -->
  <!-- neighbour 1 -->
  <line x1="160" y1="640" x2="540" y2="352" stroke="#0ea5e9" stroke-width="4" marker-end="url(#sky)"/>
  <!-- query -->
  <line x1="160" y1="640" x2="508" y2="300" stroke="#7c3aed" stroke-width="5" marker-end="url(#vio)"/>
  <!-- neighbour 2 -->
  <line x1="160" y1="640" x2="430" y2="250" stroke="#0ea5e9" stroke-width="4" marker-end="url(#sky)"/>
  <!-- far / unrelated -->
  <line x1="160" y1="640" x2="900" y2="560" stroke="#94a3b8" stroke-width="4" marker-end="url(#gry)"/>

  <!-- small angle arc + label -->
  <path d="M300,560 A 170 170 0 0 0 268 520" fill="none" stroke="#c4b5fd" stroke-width="2"/>
  <text x="300" y="500" font-size="16" fill="#c4b5fd">small angle</text>
  <text x="300" y="522" font-size="16" fill="#c4b5fd" font-weight="700">cos θ ≈ 0.95 → very similar</text>

  <!-- large angle label -->
  <path d="M360,628 A 210 210 0 0 0 330 567" fill="none" stroke="#64748b" stroke-width="2"/>
  <text x="600" y="612" font-size="15" fill="#94a3b8">large angle → cos θ ≈ 0.1 (unrelated)</text>

  <!-- vector labels -->
  <rect x="500" y="270" width="300" height="30" rx="6" fill="#1e1b4b"/>
  <text x="514" y="291" font-size="17" fill="#ede9fe" font-weight="700">query: “the part about self-doubt”</text>

  <text x="556" y="350" font-size="16" fill="#7dd3fc">“moment of stage fright”</text>
  <text x="300" y="238" font-size="16" fill="#7dd3fc">“feeling like an impostor”</text>
  <text x="760" y="556" font-size="16" fill="#94a3b8">“quarterly revenue numbers”</text>

  <!-- takeaway -->
  <text x="60" y="700" font-size="16" fill="#64748b">The query vector lands among chunks with the same meaning — even when none of those exact words were spoken. No keyword match needed.</text>
</svg>
